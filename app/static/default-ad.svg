<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff1df"/><stop offset="100%" stop-color="#ffd1b0"/></linearGradient></defs>
  <rect width="1200" height="630" rx="32" fill="url(#g)"/>
  <text x="80" y="250" font-size="64" font-family="Arial, sans-serif" font-weight="700" fill="#703200">광고 이미지 준비중</text>
  <text x="80" y="340" font-size="34" font-family="Arial, sans-serif" fill="#8b4a14">이미지 경로가 바뀌었거나 아직 업로드가 완료되지 않았습니다.</text>
  <text x="80" y="400" font-size="28" font-family="Arial, sans-serif" fill="#8b4a14">관리자에서 다시 업로드하면 자동으로 이 자리에 노출됩니다.</text>
