{% extends 'base.html' %}
{% block content %}
<div class="card form-card narrow">
  <h2>고객 로그인</h2>
  {% if success_message %}<div class="success">{{ success_message }}</div>{% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" class="form-grid auth-form-cleanup">
    <input type="hidden" name="next" value="{{ next_path or '/customer' }}">
    <label>이메일<input type="email" name="email" required value="{{ prefill_email or '' }}" autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false" inputmode="email"></label>
    <label>비밀번호<input type="password" name="password" required autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
    <button class="btn primary" type="submit">로그인</button>
  </form>
  <div class="preview-banner soft" style="margin-top:14px;">회원가입 시 알림 수신에 동의한 계정은 로그인 후 자동으로 푸시 연결을 시도합니다. 브라우저에서 알림 허용만 승인해 주세요.</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.auth-form-cleanup').forEach(function(form) {
    form.addEventListener('submit', function () {
      var email = form.querySelector('input[name="email"]');
      var password = form.querySelector('input[name="password"]');
      if (email) email.value = email.value.trim().toLowerCase();
      if (password) password.value = password.value.replace(/[\u200B\uFEFF]/g, '').trim();
    });
  });
});
</script>

{% endblock %}
