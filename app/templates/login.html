{% extends 'base.html' %}
{% block content %}
<div class="card form-card narrow">
  <h2>고객 로그인</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if switch_mode and user %}<div class="success">현재 로그인 상태를 종료하고 다른 고객 계정으로 전환합니다.</div>{% endif %}
  <form method="post" class="form-grid">
    <label>이메일<input type="email" name="email" required></label>
    <label>비밀번호<input type="password" name="password" required></label>
    <button class="btn primary" type="submit">로그인</button>
    <a class="btn" href="/admin/login">관리자 로그인으로</a>
      <a class="btn" href="/switch-account?target=/admin/login">관리자 계정 전환</a>
    </form>
</div>
{% endblock %}
