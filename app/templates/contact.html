{% extends 'base.html' %}
{% block content %}
<div class="card form-card">
  <h2>문의하기</h2>
  {% if request.query_params.get('success') %}<div class="success">문의가 접수되었습니다.</div>{% endif %}
  <form method="post" class="form-grid">
    <label>제목<input type="text" name="subject" required></label>
    <label>내용<textarea name="message" rows="6" required></textarea></label>
    <button class="btn primary" type="submit">문의 보내기</button>
  </form>
</div>
{% endblock %}
