<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>관리자 로그인</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="wrap" style="padding-top:12px;">
  <div class="admin-sticky-toolbar admin-mobile-sticky-toolbar admin-sub-toolbar">
    <div class="admin-sticky-left">
                </div>
    <div class="admin-sticky-actions">
      <a class="btn mini" href="/">고객 화면</a>
      <a class="btn mini" href="/login">고객 로그인</a>
      <a class="btn mini" href="/signup">회원가입</a>
    </div>
  </div>
</div>
<main class="wrap admin-wrap">
  <div class="card form-card narrow">
    <h2>관리자 / 매니저 로그인</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <p class="muted" style="margin-bottom:14px;">최초 최고관리자 아이디는 <strong>{{ default_admin_email }}</strong> 입니다.</p><form method="post" class="form-grid auth-form-cleanup">
      <label>이메일<input type="email" name="email" required autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false" inputmode="email"></label>
      <label>비밀번호<input type="password" name="password" required autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
      <button class="btn primary" type="submit">관리자 로그인</button>
      <a class="btn" href="/">고객 메인으로</a>
    </form>
  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.auth-form-cleanup').forEach(function(form) {
    form.addEventListener('submit', function () {
      var email = form.querySelector('input[name="email"]');
      var password = form.querySelector('input[name="password"]');
      if (email) email.value = email.value.trim().toLowerCase();
      if (password) password.value = password.value.replace(/[\u200B\uFEFF]/g, '').trim();
    });
  });
});
</script>
</body></html>
