{% extends 'base.html' %}
{% block content %}
<div class="card form-card">
  <h2>회원가입</h2>
  <p class="muted">정확한 운세 분석을 위해 기본 정보를 입력해주세요.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" class="form-grid two-col auth-form-cleanup integrated-signup-form" id="signupForm">

    <label>이름<input type="text" name="name" required value="{{ form_name or '' }}"></label>
    <label>이메일<input type="email" name="email" required value="{{ form_email or '' }}" autocapitalize="none" autocomplete="username" autocorrect="off" spellcheck="false" inputmode="email"></label>
    <label>연락처(핸드폰번호)<input type="text" name="phone" inputmode="tel" placeholder="010-1234-5678" value="{{ form_phone or '' }}" required></label>
    <label>성별
      <select name="gender" required>
        <option value="" {% if not form_gender %}selected{% endif %}>선택해 주세요</option>
        <option value="남성" {% if form_gender=='남성' %}selected{% endif %}>남성</option>
        <option value="여성" {% if form_gender=='여성' %}selected{% endif %}>여성</option>
      </select>
    </label>

    <label class="span-2">생년월일
      <div class="birth-inline-grid">
        <input type="text" id="birth_year" name="birth_year" inputmode="numeric" maxlength="4" pattern="\d{4}" placeholder="YYYY" value="{{ form_birth_year or '' }}" required>
        <span class="birth-sep">년</span>
        <input type="text" id="birth_month" name="birth_month" inputmode="numeric" maxlength="2" pattern="\d{1,2}" placeholder="MM" value="{{ form_birth_month or '' }}" required>
        <span class="birth-sep">월</span>
        <input type="text" id="birth_day" name="birth_day" inputmode="numeric" maxlength="2" pattern="\d{1,2}" placeholder="DD" value="{{ form_birth_day or '' }}" required>
        <span class="birth-sep">일</span>
      </div>
      <input type="hidden" name="birth_date" id="birth_date_hidden" value="">
    </label>

    <label>출생 시<input type="number" name="birth_hour" min="0" max="23" placeholder="08" value="{{ form_birth_hour or '' }}"></label>
    <label>출생 분<input type="number" name="birth_minute" min="0" max="59" placeholder="30" value="{{ form_birth_minute or '' }}"></label>

    <label>결혼 유무
      <select name="marital_status">
        <option value="싱글" {% if (form_marital_status or '싱글') == '싱글' %}selected{% endif %}>싱글</option>
        <option value="연애" {% if form_marital_status == '연애' %}selected{% endif %}>연애</option>
        <option value="기혼" {% if form_marital_status == '기혼' %}selected{% endif %}>기혼</option>
      </select>
    </label>
    <label>자녀 유무
      <select name="has_children">
        <option value="없음" {% if (form_has_children or '없음') == '없음' %}selected{% endif %}>없음</option>
        <option value="있음" {% if form_has_children == '있음' %}selected{% endif %}>있음</option>
      </select>
    </label>

    <label class="span-2">관심사/보고 싶은 분야<input type="text" name="interests" placeholder="예: 사업, 투자, 건강, 연애" value="{{ form_interests or '' }}"></label>

    <label>비밀번호<input type="password" name="password" id="signupPassword" required autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>
    <label>비밀번호 확인<input type="password" name="password_confirm" id="signupPasswordConfirm" required autocomplete="new-password" autocapitalize="none" autocorrect="off" spellcheck="false"></label>

    <label class="checkbox-row span-2"><input type="checkbox" id="togglePasswordView"> 비밀번호 보이기</label>
    <label class="checkbox-row consent-row span-2"><input type="checkbox" id="signupPushConsent" required checked> 회원가입과 동시에 사이트 내 알림함이 자동 활성화되며, 브라우저가 허용하면 기기 푸시도 자동 연결을 시도하는 것에 동의합니다.</label>
    <div class="muted span-2">입력이 끝나면 바로 오늘의 운세를 확인할 수 있습니다.</div>
    <div class="muted span-2">출생 시간을 모르시면 비워두셔도 됩니다. 생년월일과 성별은 정확하게 입력해 주세요.</div>
    <button class="btn primary span-2" type="submit">오늘의 운세 확인하기</button>
  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('signupForm');
  const password = document.getElementById('signupPassword');
  const confirm = document.getElementById('signupPasswordConfirm');
  const toggle = document.getElementById('togglePasswordView');
  const year = document.getElementById('birth_year');
  const month = document.getElementById('birth_month');
  const day = document.getElementById('birth_day');
  const hidden = document.getElementById('birth_date_hidden');

  const syncDate = () => {
    const y = (year?.value || '').padStart(4, '0');
    const m = (month?.value || '').padStart(2, '0');
    const d = (day?.value || '').padStart(2, '0');
    hidden.value = year?.value && month?.value && day?.value ? `${y}-${m}-${d}` : '';
  };

  const numericOnly = (input, maxLen, nextInput) => {
    if (!input) return;
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '').slice(0, maxLen);
      if (nextInput && input.value.length === maxLen) nextInput.focus();
      syncDate();
    });
    input.addEventListener('blur', syncDate);
  };

  numericOnly(year, 4, month);
  numericOnly(month, 2, day);
  numericOnly(day, 2, null);

  [year, month, day].forEach((el, idx) => {
    if (!el) return;
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !el.value) {
        if (idx === 1 && year) year.focus();
        if (idx === 2 && month) month.focus();
      }
    });
  });
  syncDate();

  if (toggle) {
    toggle.addEventListener('change', function () {
      const nextType = toggle.checked ? 'text' : 'password';
      if (password) password.type = nextType;
      if (confirm) confirm.type = nextType;
    });
  }

  if (form) {
    form.addEventListener('submit', function (e) {
      var email = form.querySelector('input[name="email"]');
      if (email) email.value = email.value.trim().toLowerCase();
      [password, confirm].forEach(function(field){
        if (field) field.value = field.value.replace(/[​﻿]/g, '').trim();
      });
      syncDate();
      if (!password || !confirm) return;
      if (password.value.length < 4) {
        e.preventDefault();
        alert('비밀번호는 4자 이상으로 입력해 주세요.');
        password.focus();
        return;
      }
      if (password.value !== confirm.value) {
        e.preventDefault();
        alert('비밀번호와 비밀번호 확인이 일치하지 않습니다. 다시 확인해 주세요.');
        confirm.focus();
        return;
      }
      if (!hidden.value) {
        e.preventDefault();
        alert('생년월일을 정확히 입력해 주세요.');
        year?.focus();
      }
    });
  }
});
</script>
{% endblock %}
