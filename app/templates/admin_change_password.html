<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>관리자 비밀번호 변경</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<main class="wrap admin-wrap">
  <div class="admin-mobile-quick mobile-only">
    <a href="/admin">관리자 홈</a>
    <a href="/">고객 화면</a>
    <a href="/fortune">운세 보기</a>
    <a href="/profile">프로필</a>
    <a href="/switch-account?target=/login">계정 전환</a>
    <a href="/logout">로그아웃</a>
  </div>

  <div class="card form-card narrow">
    <h2>관리자 비밀번호 변경</h2>
    <p class="muted">임시 비밀번호로 로그인했습니다. 관리자 화면으로 들어가기 전에 새 비밀번호로 꼭 변경해주세요.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" class="form-grid">
      <label>새 비밀번호<input type="password" name="new_password" minlength="10" required></label>
      <label>새 비밀번호 확인<input type="password" name="confirm_password" minlength="10" required></label>
      <button class="btn primary" type="submit">새 비밀번호 저장</button>
      <a class="btn" href="/">고객 화면 보기</a>
      <a class="btn" href="/logout">나중에 하기</a>
    </form>
  </div>
</main>
</body></html>
