{% extends 'base.html' %}
{% block title %}결제 실패{% endblock %}
{% block content %}
<section class="card fail-panel">
  <div class="badge">PAYMENT FAIL</div>
  <h1>결제가 완료되지 않았습니다</h1>
  <p>테스트 실패 흐름이 정상 기록되었습니다. 다시 시도하거나 다른 플랜을 선택할 수 있습니다.</p>
  <div class="checkout-lines">
    <div><span>주문번호</span><strong>{{ payment.order_id }}</strong></div>
    <div><span>플랜</span><strong>{{ payment.plan }}</strong></div>
    <div><span>사유</span><strong>{{ payment.fail_reason or '-' }}</strong></div>
  </div>
  <div class="actions">
    <a class="btn primary" href="/checkout/{{ payment.order_id }}">다시 시도</a>
    <a class="btn" href="/plans">플랜 목록</a>
  </div>
</section>
{% endblock %}
