services:
  - type: web
    name: mysticday
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: APPDATA
        value: /data
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: mysticday-data
      mountPath: /data
      sizeGB: 1
