services:
  - type: web
    name: mysticday
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DATA_DIR
        value: /data/mysticday
      - key: RENDER
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: RELEASE_VERSION
        value: "v98-mobile-render-final"
    disk:
      name: mysticday-data
      mountPath: /data
      sizeGB: 1
